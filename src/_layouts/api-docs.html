---
layout: default
---
<div class="grid-row">
  {% if page.in-page-nav == true %}
  <div class="grid-col-auto order-last width-card-lg display-none desktop-lg:display-block">
    <aside
      id="toc"
      class="usa-in-page-nav margin-top-0 overflow-y-auto padding-y-2"
      style="top: 6rem; max-height: calc(100vh - 6rem);"
      data-main-content-selector="#page-content"
      data-title-text="{{ page.in-page-nav-title }}"
      data-heading-elements="{{ page.in-page-nav-levels }}"
      data-scroll-offset="100"
      data-tealium="toc"
    ></aside>
  </div>
  {% endif %}
  <div
    id="page-content"
    class="grid-col-fill padding-y-4 usa-prose tablet:padding-left-205"
  >
    <div>{{ content }}</div>

    {% if page.feedback_id %}
    {% include feedback-form.html id=page.feedback_id %}
    {% endif %}
  </div>
</div>
